# https://taskfile.dev

version: '3'

tasks:
  default:
    cmds:
      - go run ./cmd/pobby/main.go
    silent: true

  build:
    cmds:
      - go build ./cmd/pobby/main.go

  pobby:
    cmds:
      - go run ./cmd/pobby/main.go pobby
  
  pin: 
    cmds:
      - go run ./cmd/pobby/main.go pin {{.ARGS}}


